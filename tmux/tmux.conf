set -a terminal-features "tmux-256color:RGB"

set -g prefix C-a
set -g base-index 1
set -g renumber-windows on   
set -g mode-keys vi
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=#7970A9 bold"
set -g status-right ""
set -g status-left "#S"
set -g status-left-style "fg=#C6C6C2"

# Increase scrollback history
set -g history-limit 50000

# Enable mouse support (allows clicking panes and scrolling)
set -g mouse on

bind r source-file "~/.config/tmux/tmux.conf"

# new window
bind c new-window -c '#{pane_current_path}'

# split
bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

bind b set -g status
bind f run-shell "tmux neww ~/.config/scripts/tmux-sessionizer.sh"
bind D run-shell "~/.config/scripts/tmux-sessionizer.sh ~/.config"
bind V run-shell "tmux neww ~/.config/scripts/tmux-vpnizer.sh"
bind S run-shell "tmux neww ~/.config/scripts/tmux-sshizer.sh"

# Fix nvim cursor change 
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Remove delay when pressing esc in Neovim
set -sg escape-time 0

# Allow Neovim to detect when a file changes on disk
set -g focus-events on

# Navigate panes using h, j, k, l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using uppercase H, J, K, L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Use 'v' to start selection (like Neovim)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Escape send-keys -X cancel
